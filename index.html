<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AutoBooks CA ⚡</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{background:#080c14;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif}
    ::-webkit-scrollbar{width:2px;height:2px}
    ::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:4px}
    button{cursor:pointer;font-family:inherit;-webkit-appearance:none}
    input,select,textarea{font-family:inherit;-webkit-appearance:none;appearance:none}
    .hrow:hover{background:rgba(255,255,255,0.04)!important}
    .icard{transition:all 0.18s;cursor:pointer}
    .icard:active{transform:scale(0.97)}

    .app-shell{display:flex;flex-direction:column;height:100vh;height:100dvh}
    .top-nav{background:#0d1526;border-bottom:1px solid rgba(255,255,255,0.08);padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:54px;flex-shrink:0;z-index:100}
    .nav-tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
    .nav-tabs::-webkit-scrollbar{display:none}
    .main-area{display:flex;flex:1;overflow:hidden}
    .sidebar{width:196px;border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;flex-shrink:0;background:#0a0f1a;transition:transform 0.25s}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200}
    .content{flex:1;overflow-y:auto;padding:16px}
    .bottom-nav{display:none;background:#0d1526;border-top:1px solid rgba(255,255,255,0.08);flex-shrink:0}
    .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px}
    .dash-grid{display:grid;grid-template-columns:3fr 2fr;gap:14px}
    .intg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px}
    .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;min-width:520px}

    @media(max-width:900px){
      .kpi-grid{grid-template-columns:repeat(3,1fr)}
      .dash-grid{grid-template-columns:1fr}
      .intg-grid{grid-template-columns:repeat(2,1fr)}
      .sidebar{position:fixed;top:54px;left:0;height:calc(100dvh - 54px);z-index:300;transform:translateX(-100%)}
      .sidebar.open{transform:translateX(0)}
      .sidebar-overlay.open{display:block}
      .nav-tabs{display:none}
      .bottom-nav{display:flex;justify-content:space-around;padding:4px 0 max(4px,env(safe-area-inset-bottom))}
      #hamburger{display:flex!important}
    }
    @media(max-width:600px){
      .top-nav{padding:0 12px;height:50px}
      .kpi-grid{grid-template-columns:repeat(2,1fr);gap:8px}
      .kpi-grid>*:last-child{grid-column:span 2}
      .dash-grid,.intg-grid{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
      .content{padding:10px}
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── ACCOUNTING ENGINE ─────────────────────────────────────────────────
const GST=0.18;
const ACCOUNTS={
  CASH:{code:"1001",name:"Cash in Hand",type:"Asset"},
  BANK:{code:"1002",name:"Bank Account",type:"Asset"},
  RECEIVABLE:{code:"1003",name:"Accounts Receivable",type:"Asset"},
  INVENTORY:{code:"1004",name:"Stock / Inventory",type:"Asset"},
  PAYABLE:{code:"2001",name:"Accounts Payable",type:"Liability"},
  GST_PAY:{code:"2002",name:"GST Payable",type:"Liability"},
  GST_INPUT:{code:"2003",name:"GST Input Credit",type:"Asset"},
  CAPITAL:{code:"3001",name:"Owner's Capital",type:"Equity"},
  SALES:{code:"4001",name:"Sales Revenue",type:"Revenue"},
  PURCHASE:{code:"5001",name:"Purchases",type:"Expense"},
  SALARY:{code:"5002",name:"Salary Expense",type:"Expense"},
  RENT:{code:"5003",name:"Rent Expense",type:"Expense"},
  MISC:{code:"5004",name:"Miscellaneous Exp.",type:"Expense"},
};
const TYPE_LABELS={SALE_CASH:"Sale (Cash)",SALE_CREDIT:"Sale (Credit)",PURCHASE_CASH:"Purchase (Cash)",PURCHASE_CREDIT:"Purchase (Credit)",EXPENSE:"Expense",RECEIPT:"Receipt",PAYMENT:"Payment"};
const TYPE_COLORS={SALE_CASH:"#22c55e",SALE_CREDIT:"#86efac",PURCHASE_CASH:"#f97316",PURCHASE_CREDIT:"#fdba74",EXPENSE:"#f43f5e",RECEIPT:"#3b82f6",PAYMENT:"#a78bfa"};
const SRC_COLORS={AUTO:"#fbbf24",MANUAL:"#93c5fd",CSV:"#22c55e",TALLY:"#f97316",AI_PARSE:"#a855f7",DEMO:"#64748b"};

function makeEntries(bill){
  const amt=bill.amount,gst=parseFloat((amt*GST).toFixed(2)),tot=parseFloat((amt+gst).toFixed(2)),e=[];
  if(bill.type==="SALE_CASH"){e.push({account:"CASH",dr:tot,cr:0});e.push({account:"SALES",dr:0,cr:amt});e.push({account:"GST_PAY",dr:0,cr:gst});}
  else if(bill.type==="SALE_CREDIT"){e.push({account:"RECEIVABLE",dr:tot,cr:0});e.push({account:"SALES",dr:0,cr:amt});e.push({account:"GST_PAY",dr:0,cr:gst});}
  else if(bill.type==="PURCHASE_CASH"){e.push({account:"PURCHASE",dr:amt,cr:0});e.push({account:"GST_INPUT",dr:gst,cr:0});e.push({account:"CASH",dr:0,cr:tot});}
  else if(bill.type==="PURCHASE_CREDIT"){e.push({account:"PURCHASE",dr:amt,cr:0});e.push({account:"GST_INPUT",dr:gst,cr:0});e.push({account:"PAYABLE",dr:0,cr:tot});}
  else if(bill.type==="EXPENSE"){const a=bill.expenseAccount||"MISC";e.push({account:a,dr:amt,cr:0});e.push({account:"CASH",dr:0,cr:amt});}
  else if(bill.type==="RECEIPT"){e.push({account:"BANK",dr:amt,cr:0});e.push({account:"RECEIVABLE",dr:0,cr:amt});}
  else if(bill.type==="PAYMENT"){e.push({account:"PAYABLE",dr:amt,cr:0});e.push({account:"BANK",dr:0,cr:amt});}
  return e;
}
let gid=100;
const makeTx=(bill,src)=>({id:++gid,date:new Date().toISOString(),billNo:bill.billNo||"TX-"+gid,party:bill.party||"—",type:bill.type,amount:bill.amount,narration:bill.narration,source:src||"MANUAL",expenseAccount:bill.expenseAccount,journalEntries:makeEntries(bill),paid:false});
const computeBal=txs=>{const b={};Object.keys(ACCOUNTS).forEach(k=>b[k]=0);txs.forEach(tx=>tx.journalEntries.forEach(e=>{b[e.account]=(b[e.account]||0)+e.dr-e.cr;}));return b;};
const fmt=n=>"₹"+Math.abs(n).toLocaleString("en-IN",{minimumFractionDigits:2});
const fmtD=iso=>new Date(iso).toLocaleDateString("en-IN",{day:"2-digit",month:"short"});

const DEMO=[
  {type:"SALE_CASH",amount:4500,narration:"Sale: Mobile Covers + Screen Guards",billNo:"INV-1001",party:"Walk-in Customer"},
  {type:"SALE_CREDIT",amount:12000,narration:'Sale: Samsung TV 32"',billNo:"INV-1002",party:"Ramesh Electronics"},
  {type:"PURCHASE_CREDIT",amount:25000,narration:"Stock Purchase: Electronics Batch",billNo:"PUR-501",party:"Raj Distributors"},
  {type:"PURCHASE_CREDIT",amount:40000,narration:"Stock Purchase: Smartphones",billNo:"PUR-502",party:"Galaxy Wholesale"},
  {type:"EXPENSE",amount:8000,narration:"Monthly Shop Rent",billNo:"RENT-03",party:"Landlord",expenseAccount:"RENT"},
  {type:"SALE_CASH",amount:6500,narration:"Sale: Earphones + Cables",billNo:"INV-1003",party:"Walk-in"},
].map(b=>makeTx(b,"DEMO"));

// ── STYLES HELPERS ────────────────────────────────────────────────────
const INP={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"11px 14px",color:"#e2e8f0",fontSize:15,width:"100%"};
const LBL={fontSize:11,color:"#64748b",display:"block",marginBottom:5,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.8px"};
const BTN=(color,bg)=>({padding:"13px 20px",borderRadius:10,border:"none",background:bg||`linear-gradient(135deg,${color},${color}cc)`,color:color==="#0a0f1e"?"#0a0f1e":"white",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",marginTop:6});

// ── MODAL ─────────────────────────────────────────────────────────────
function Modal({title,onClose,children}){
  return(
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#0d1526",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:580,maxHeight:"93vh",overflowY:"auto",padding:"0 16px 20px",paddingBottom:"max(20px,env(safe-area-inset-bottom))"}}>
        <div style={{width:40,height:4,background:"rgba(255,255,255,0.15)",borderRadius:2,margin:"12px auto 14px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16,alignItems:"center"}}>
          <span style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{title}</span>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.08)",border:"none",color:"#94a3b8",width:32,height:32,borderRadius:"50%",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── API KEY SETUP MODAL ───────────────────────────────────────────────
function APIKeyModal({onSave,onClose}){
  const [key,setKey]=useState("");
  const [show,setShow]=useState(false);
  return(
    <Modal title="🔑 Set Anthropic API Key" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{padding:14,background:"rgba(245,158,11,0.08)",borderRadius:10,border:"1px solid rgba(245,158,11,0.2)",fontSize:13,color:"#fbbf24",lineHeight:1.7}}>
          ⚡ <strong>Why is this needed?</strong><br/>
          When running as a local HTML file (not inside Claude.ai), the AI analysis requires your own Anthropic API key to connect. Your key is stored only in this browser session — never sent anywhere else.
        </div>
        <div>
          <label style={LBL}>Your Anthropic API Key</label>
          <div style={{display:"flex",gap:8}}>
            <input type={show?"text":"password"} value={key} onChange={e=>setKey(e.target.value)} style={{...INP,flex:1,fontFamily:"monospace",fontSize:13}} placeholder="sk-ant-api03-..."/>
            <button onClick={()=>setShow(!show)} style={{padding:"11px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.05)",color:"#94a3b8",fontSize:13,flexShrink:0}}>
              {show?"🙈":"👁"}
            </button>
          </div>
        </div>
        <div style={{fontSize:12,color:"#64748b",lineHeight:1.8}}>
          <div>1. Go to <strong style={{color:"#93c5fd"}}>console.anthropic.com</strong></div>
          <div>2. API Keys → Create new key</div>
          <div>3. Copy and paste above</div>
        </div>
        <button onClick={()=>{if(key.startsWith("sk-")){onSave(key);onClose();}else alert("Key must start with sk-ant-...")}} style={{...BTN("#0a0f1e"),background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#0a0f1e"}}>
          Save API Key & Analyse
        </button>
      </div>
    </Modal>
  );
}

// ── PAY NOW MODAL ─────────────────────────────────────────────────────
function PayNowModal({tx,vendors,onPaymentDone,onClose}){
  const [method,setMethod]=useState("upi");
  const [upiId,setUpiId]=useState("");
  const [mobile,setMobile]=useState("");
  const [name,setName]=useState(tx.party||"");
  const [bankAcc,setBankAcc]=useState("");
  const [ifsc,setIfsc]=useState("");
  const [chequeNo,setChequeNo]=useState("");
  const [ref,setRef]=useState("");
  const [step,setStep]=useState(1); // 1=details, 2=qr/confirm
  const [saved,setSaved]=useState(false);

  // Load vendor info if exists
  const vendor=vendors[tx.party]||{};
  useEffect(()=>{
    if(vendor.upiId) setUpiId(vendor.upiId);
    if(vendor.mobile) setMobile(vendor.mobile);
    if(vendor.bankAcc) setBankAcc(vendor.bankAcc);
    if(vendor.ifsc) setIfsc(vendor.ifsc);
    if(vendor.method) setMethod(vendor.method);
  },[]);

  const totalAmt=parseFloat((tx.amount*1.18).toFixed(2));
  const upiString=`upi://pay?pa=${encodeURIComponent(upiId||mobile+"@paytm")}&pn=${encodeURIComponent(name)}&am=${totalAmt}&cu=INR&tn=${encodeURIComponent("Payment: "+tx.billNo)}`;
  const qrUrl=`https://chart.googleapis.com/chart?cht=qr&chs=240x240&chl=${encodeURIComponent(upiString)}&choe=UTF-8`;

  const METHODS=[
    {id:"upi",icon:"📱",label:"UPI / QR Code",color:"#22c55e"},
    {id:"mobile",icon:"📲",label:"Mobile Number UPI",color:"#3b82f6"},
    {id:"bank",icon:"🏦",label:"Bank Transfer / NEFT",color:"#f59e0b"},
    {id:"cheque",icon:"📝",label:"Cheque",color:"#a855f7"},
    {id:"netbanking",icon:"💻",label:"Net Banking",color:"#f97316"},
    {id:"cash",icon:"💵",label:"Cash",color:"#64748b"},
  ];

  return(
    <Modal title={`💳 Pay: ${tx.party}`} onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {/* Amount due */}
        <div style={{padding:"12px 16px",background:"rgba(244,63,94,0.08)",borderRadius:10,border:"1px solid rgba(244,63,94,0.2)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:11,color:"#f43f5e",textTransform:"uppercase",letterSpacing:"1px"}}>Amount Due</div>
            <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{tx.billNo} · {tx.narration}</div>
          </div>
          <div style={{fontSize:22,fontWeight:800,color:"#f43f5e",fontFamily:"monospace"}}>{fmt(totalAmt)}</div>
        </div>

        {step===1&&(<>
          {/* Payment method picker */}
          <div>
            <label style={LBL}>Payment Method</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
              {METHODS.map(m=>(
                <button key={m.id} onClick={()=>setMethod(m.id)} style={{padding:"10px 6px",borderRadius:10,border:`1px solid ${method===m.id?m.color+"66":"rgba(255,255,255,0.08)"}`,background:method===m.id?m.color+"15":"rgba(255,255,255,0.02)",color:method===m.id?m.color:"#64748b",fontSize:11,fontWeight:600,display:"flex",flexDirection:"column",alignItems:"center",gap:4,cursor:"pointer",transition:"all 0.15s"}}>
                  <span style={{fontSize:20}}>{m.icon}</span>{m.label}
                </button>
              ))}
            </div>
          </div>

          {/* Vendor name */}
          <div><label style={LBL}>Payee Name</label>
            <input value={name} onChange={e=>setName(e.target.value)} style={INP} placeholder="Vendor / Party Name"/>
          </div>

          {/* UPI ID */}
          {method==="upi"&&(<div><label style={LBL}>UPI ID</label>
            <input value={upiId} onChange={e=>setUpiId(e.target.value)} style={INP} placeholder="vendor@upi or name@okaxis"/>
          </div>)}

          {/* Mobile UPI */}
          {method==="mobile"&&(<div><label style={LBL}>Mobile Number (UPI linked)</label>
            <input type="tel" inputMode="numeric" value={mobile} onChange={e=>setMobile(e.target.value.replace(/\D/g,"").slice(0,10))} style={INP} placeholder="10-digit mobile number"/>
          </div>)}

          {/* Bank Transfer */}
          {method==="bank"&&(<>
            <div><label style={LBL}>Account Number</label><input value={bankAcc} onChange={e=>setBankAcc(e.target.value)} style={INP} placeholder="Account number"/></div>
            <div><label style={LBL}>IFSC Code</label><input value={ifsc} onChange={e=>setIfsc(e.target.value.toUpperCase())} style={INP} placeholder="e.g. SBIN0001234"/></div>
          </>)}

          {/* Cheque */}
          {method==="cheque"&&(<div><label style={LBL}>Cheque Number</label>
            <input value={chequeNo} onChange={e=>setChequeNo(e.target.value)} style={INP} placeholder="6-digit cheque number"/>
          </div>)}

          {/* Reference */}
          <div><label style={LBL}>Payment Reference / Note (optional)</label>
            <input value={ref} onChange={e=>setRef(e.target.value)} style={INP} placeholder="UTR / transaction ID / note"/>
          </div>

          <button onClick={()=>setStep(2)} style={{...BTN("#0a0f1e"),background:"linear-gradient(135deg,#f59e0b,#d97706)",color:"#0a0f1e"}}>
            Continue →
          </button>
        </>)}

        {step===2&&(<>
          {/* UPI QR */}
          {(method==="upi"||method==="mobile")&&(
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:14}}>
              <div style={{padding:16,background:"white",borderRadius:16,display:"inline-block"}}>
                <img src={qrUrl} alt="UPI QR" style={{width:200,height:200,display:"block"}} onError={e=>{e.target.style.display="none";}}/>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:13,color:"#94a3b8"}}>Scan with any UPI app</div>
                <div style={{fontSize:12,color:"#475569",marginTop:4}}>PhonePe · Google Pay · Paytm · BHIM · Any UPI</div>
              </div>
              <div style={{padding:"10px 14px",background:"rgba(34,197,94,0.08)",borderRadius:10,border:"1px solid rgba(34,197,94,0.2)",width:"100%",textAlign:"center"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#22c55e"}}>Pay To: {name}</div>
                <div style={{fontSize:13,color:"#94a3b8",marginTop:2}}>{upiId||mobile+"@paytm"}</div>
                <div style={{fontSize:18,fontWeight:800,color:"#e2e8f0",fontFamily:"monospace",marginTop:4}}>{fmt(totalAmt)}</div>
              </div>
              {/* Deep link for mobile */}
              <a href={upiString} style={{display:"block",width:"100%",padding:"13px",borderRadius:10,background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",fontSize:14,fontWeight:700,textAlign:"center",textDecoration:"none"}}>
                📱 Open UPI App to Pay
              </a>
            </div>
          )}

          {/* Bank details */}
          {method==="bank"&&(
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[["Pay To",name],["Account No",bankAcc],["IFSC",ifsc],["Amount",fmt(totalAmt)],["Narration","Payment: "+tx.billNo]].map(([k,v])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",padding:"10px 14px",background:"rgba(255,255,255,0.04)",borderRadius:8}}>
                  <span style={{color:"#64748b",fontSize:13}}>{k}</span>
                  <span style={{color:"#e2e8f0",fontWeight:600,fontSize:13,fontFamily:k==="Account No"?"monospace":"inherit"}}>{v}</span>
                </div>
              ))}
            </div>
          )}

          {/* Cheque details */}
          {method==="cheque"&&(
            <div style={{padding:16,background:"rgba(168,85,247,0.06)",borderRadius:12,border:"1px solid rgba(168,85,247,0.2)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#c4b5fd",marginBottom:10}}>📝 Write Cheque As:</div>
              {[["Pay To",name],["Amount (words)",amountToWords(totalAmt)],["Amount (figures)",fmt(totalAmt)],["Cheque No",chequeNo]].map(([k,v])=>(
                <div key={k} style={{padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",gap:10}}>
                  <span style={{color:"#64748b",fontSize:12,minWidth:110}}>{k}</span>
                  <span style={{color:"#e2e8f0",fontSize:13,fontWeight:600}}>{v}</span>
                </div>
              ))}
            </div>
          )}

          {/* Net banking / Cash */}
          {(method==="netbanking"||method==="cash")&&(
            <div style={{padding:14,background:"rgba(255,255,255,0.03)",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",textAlign:"center"}}>
              <div style={{fontSize:34,marginBottom:8}}>{method==="netbanking"?"💻":"💵"}</div>
              <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0"}}>{fmt(totalAmt)}</div>
              <div style={{fontSize:13,color:"#94a3b8",marginTop:4}}>Pay to: {name}</div>
              <div style={{fontSize:12,color:"#64748b",marginTop:2}}>Ref: {tx.billNo}</div>
            </div>
          )}

          <div style={{display:"flex",gap:10,marginTop:6}}>
            <button onClick={()=>setStep(1)} style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#94a3b8",fontSize:14,fontWeight:600,cursor:"pointer"}}>← Back</button>
            <button onClick={()=>{onPaymentDone(tx.id,{method,upiId,mobile,bankAcc,ifsc,chequeNo,ref,name});onClose();}} style={{flex:2,padding:"12px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              ✅ Mark as Paid
            </button>
          </div>
        </>)}
      </div>
    </Modal>
  );
}

// ── AMOUNT TO WORDS (basic) ───────────────────────────────────────────
function amountToWords(n){
  const ones=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
  const tens=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
  const convert=num=>{
    if(num===0) return"";
    if(num<20) return ones[num]+" ";
    if(num<100) return tens[Math.floor(num/10)]+" "+(num%10?ones[num%10]+" ":"");
    if(num<1000) return ones[Math.floor(num/100)]+" Hundred "+(num%100?convert(num%100):"");
    if(num<100000) return convert(Math.floor(num/1000))+"Thousand "+convert(num%1000);
    if(num<10000000) return convert(Math.floor(num/100000))+"Lakh "+convert(num%100000);
    return convert(Math.floor(num/10000000))+"Crore "+convert(num%10000000);
  };
  const rupees=Math.floor(n), paise=Math.round((n-rupees)*100);
  let words=convert(rupees).trim()+" Rupees";
  if(paise>0) words+=" and "+convert(paise).trim()+" Paise";
  return words+" Only";
}

    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const lines=ev.target.result.trim().split("\n");
      const hdrs=lines[0].split(",").map(h=>h.trim().replace(/"/g,"").toLowerCase());
      setHeaders(hdrs);
      setRawRows(lines.slice(1).map(line=>{const vals=line.split(",").map(v=>v.trim().replace(/"/g,""));const obj={};hdrs.forEach((h,i)=>obj[h]=vals[i]||"");return obj;}));
    };
    reader.readAsText(file);
  };
  const detectType=row=>{const t=(row[mapping.type]||"").toLowerCase();if(t.includes("sale")&&t.includes("credit"))return"SALE_CREDIT";if(t.includes("sale"))return"SALE_CASH";if(t.includes("purchase")&&t.includes("credit"))return"PURCHASE_CREDIT";if(t.includes("purchase"))return"PURCHASE_CASH";if(t.includes("expense"))return"EXPENSE";if(t.includes("receipt"))return"RECEIPT";if(t.includes("payment"))return"PAYMENT";return"SALE_CASH";};

          {[["type","Type"],["amount","Amount"],["narration","Description"],["party","Party"],["billNo","Bill No"]].map(([key,label])=>(
            <div key={key}><label style={{...LBL,fontSize:9}}>{label}</label>
              <select value={mapping[key]} onChange={e=>setMapping(m=>({...m,[key]:e.target.value}))} style={{...INP,fontSize:13,padding:"8px 10px"}}>
                <option value="">skip</option>{headers.map(h=><option key={h} value={h}>{h}</option>)}

function TallyImport({onImport,onClose}){
  const [xmlText,setXmlText]=useState("");
  const [parsed,setParsed]=useState([]);
  const [done,setDone]=useState(false);
  const sample=`<ENVELOPE><BODY><IMPORTDATA><REQUESTDATA><TALLYMESSAGE>
  <VOUCHER><DATE>20250301</DATE><VOUCHERTYPENAME>Sales</VOUCHERTYPENAME><VOUCHERNUMBER>INV-001</VOUCHERNUMBER><PARTYLEDGERNAME>Ramesh Traders</PARTYLEDGERNAME><NARRATION>Sale of goods</NARRATION><AMOUNT>-15000</AMOUNT></VOUCHER>
  <VOUCHER><DATE>20250302</DATE><VOUCHERTYPENAME>Purchase</VOUCHERTYPENAME><VOUCHERNUMBER>PUR-001</VOUCHERNUMBER><PARTYLEDGERNAME>Supplier Co</PARTYLEDGERNAME><NARRATION>Purchase of stock</NARRATION><AMOUNT>25000</AMOUNT></VOUCHER>
</TALLYMESSAGE></REQUESTDATA></IMPORTDATA></BODY></ENVELOPE>`;
  const parse=()=>{
    try{
      const doc=new DOMParser().parseFromString(xmlText,"text/xml");
      const txs=[];
      doc.querySelectorAll("VOUCHER").forEach(v=>{
        const vt=(v.querySelector("VOUCHERTYPENAME")?.textContent||"").toLowerCase();
        let amt=0;v.querySelectorAll("AMOUNT").forEach(a=>{const n=Math.abs(parseFloat(a.textContent||"0"));if(n>amt)amt=n;});
        if(!amt)return;
        let type="SALE_CASH";
        if(vt.includes("sales"))type="SALE_CREDIT";else if(vt.includes("purchase"))type="PURCHASE_CREDIT";else if(vt.includes("receipt"))type="RECEIPT";else if(vt.includes("payment"))type="PAYMENT";
        txs.push({type,amount:amt,narration:v.querySelector("NARRATION")?.textContent||"Tally Import",party:v.querySelector("PARTYLEDGERNAME")?.textContent||"—",billNo:v.querySelector("VOUCHERNUMBER")?.textContent||"TLY-"+Date.now()});
      });
      setParsed(txs);setDone(true);
    }catch{alert("Invalid XML format.");}
  };
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{padding:12,background:"rgba(59,130,246,0.06)",borderRadius:10,border:"1px solid rgba(59,130,246,0.2)",fontSize:13,color:"#93c5fd",lineHeight:1.7}}>🏢 <strong>Tally:</strong> Gateway → Display → Day Book → Export → XML</div>
      {!done&&(<>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={LBL}>Paste Tally XML</span>
          <button onClick={()=>setXmlText(sample)} style={{fontSize:11,color:"#fbbf24",background:"none",border:"none",cursor:"pointer"}}>Load Sample</button>
        </div>
        <textarea value={xmlText} onChange={e=>setXmlText(e.target.value)} rows={7} style={{...INP,resize:"none",fontSize:11,fontFamily:"monospace",color:"#86efac"}}/>
        <button onClick={parse} disabled={!xmlText.trim()} style={{...BTN("#0a0f1e"),background:xmlText.trim()?"linear-gradient(135deg,#3b82f6,#1d4ed8)":"#1e293b",color:"white",cursor:xmlText.trim()?"pointer":"not-allowed"}}>🔍 Parse XML</button>
      </>)}
      {done&&(<>
        <div style={{padding:10,background:"rgba(34,197,94,0.08)",borderRadius:8,fontSize:13,color:"#86efac"}}>✅ Found {parsed.length} vouchers</div>
        <div style={{maxHeight:180,overflowY:"auto"}}>
          {parsed.map((t,i)=>(
            <div key={i} style={{padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",justifyContent:"space-between",fontSize:13}}>
              <div><div style={{color:"#e2e8f0",fontWeight:600}}>{t.narration}</div><div style={{color:"#475569",fontSize:11,marginTop:2}}>{t.billNo} · {t.party}</div></div>
              <span style={{color:"#fbbf24",fontFamily:"monospace",fontWeight:700,flexShrink:0,marginLeft:10}}>{fmt(t.amount)}</span>
            </div>
          ))}
        </div>
        <button onClick={()=>{onImport(parsed.map(b=>makeTx(b,"TALLY")));onClose();}} style={{...BTN("#0a0f1e"),background:"linear-gradient(135deg,#22c55e,#16a34a)",color:"white"}}>✅ Import All</button>
      </>)}

  );
}

                    {rows.map(([name,val])=>(
                      <div key={name} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:14,color:"#94a3b8"}}>
                        <span>{name}</span><span style={{fontFamily:"monospace"}}>{fmt(Math.abs(val))}</span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontSize:14,fontWeight:700,color}}>
                      <span>Total {title}</span><span style={{fontFamily:"monospace"}}>{fmt(Math.abs(total))}</span>
                    </div>
                  </div>
                ))}
                <div style={{padding:"12px 14px",background:"rgba(255,255,255,0.04)",borderRadius:10,display:"flex",justifyContent:"space-between",marginBottom:18,fontSize:15,fontWeight:700}}>
                  <span style={{color:"#fbbf24"}}>Gross Profit</span>
                  <span style={{fontFamily:"monospace",color:grossProfit>=0?"#22c55e":"#f43f5e"}}>{fmt(grossProfit)}</span>
                </div>
                <div style={{marginBottom:18}}>
                  <div style={{fontSize:10,fontWeight:700,color:"#475569",letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:10}}>OPERATING EXPENSES</div>
                  {[["Salary","SALARY"],["Rent","RENT"],["Miscellaneous","MISC"]].filter(([,k])=>bal[k]).map(([name,key])=>(
                    <div key={key} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:14,color:"#94a3b8"}}>
                      <span>{name}</span><span style={{fontFamily:"monospace",color:"#f43f5e"}}>{fmt(bal[key])}</span>
                    </div>
                  ))}
                  <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",fontSize:14,fontWeight:700,color:"#f43f5e"}}>
                    <span>Total Expenses</span><span style={{fontFamily:"monospace"}}>{fmt(totalExpense)}</span>
                  </div>
                </div>
                <div style={{padding:"16px 18px",background:netProfit>=0?"rgba(34,197,94,0.1)":"rgba(244,63,94,0.1)",borderRadius:12,border:`1px solid ${netProfit>=0?"rgba(34,197,94,0.3)":"rgba(244,63,94,0.3)"}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:16,fontWeight:800,color:netProfit>=0?"#22c55e":"#f43f5e"}}>Net {netProfit>=0?"Profit":"Loss"}</span>
                  <span style={{fontFamily:"monospace",fontSize:22,fontWeight:800,color:netProfit>=0?"#22c55e":"#f43f5e"}}>{fmt(Math.abs(netProfit))}</span>
                </div>
              </div>
            </div>
          )}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <div style={{background:"#080c14",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"10px 20px",textAlign:"center",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
        <span style={{fontSize:11,color:"#334155"}}>Made by</span>
        <span style={{fontSize:12,fontWeight:700,color:"#475569",letterSpacing:"0.3px"}}>Kalbi Solutions Pvt. Ltd.</span>
        <span style={{fontSize:11,color:"#1e293b"}}>·</span>
        <span style={{fontSize:10,color:"#1e293b"}}>© {new Date().getFullYear()}</span>
      </div>

      {/* ── BOTTOM NAV (mobile/tablet) ── */}
      <div className="bottom-nav">
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>{setTab(t.id);setSidebarOpen(false);}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"7px 2px",border:"none",background:"transparent",color:tab===t.id?"#fbbf24":"#475569",cursor:"pointer",borderTop:tab===t.id?"2px solid #f59e0b":"2px solid transparent",position:"relative"}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px",whiteSpace:"nowrap"}}>{t.label}</span>
            {t.id==="payments"&&pendingPayments.length>0&&<span style={{position:"absolute",top:4,right:"20%",background:"#f43f5e",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontWeight:700}}>{pendingPayments.length}</span>}
          </button>
        ))}
      </div>

      {/* ── MODALS ── */}
      {showApiModal&&<APIKeyModal onSave={key=>{setApiKey(key);addLog("🔑 API key saved");setTimeout(()=>callAI(key),300);}} onClose={()=>setShowApiModal(false)}/>}
      {modal==="add"&&<Modal title="✍️ Add Transaction" onClose={()=>setModal(null)}><TxForm onSave={f=>{setTxs(t=>[makeTx(f,"MANUAL"),...t]);addLog("✍️ Manual: "+f.narration);setModal(null);}}/></Modal>}
      {modal==="csv"&&<Modal title="📁 CSV Import" onClose={()=>setModal(null)}><CSVImport onImport={t=>importTxs(t,"CSV")} onClose={()=>setModal(null)}/></Modal>}
      {modal==="ai"&&<Modal title="🤖 AI Bill Parser" onClose={()=>setModal(null)}><AIBillParser onImport={t=>importTxs(t,"AI_PARSE")} onClose={()=>setModal(null)} apiKey={apiKey}/></Modal>}
      {modal==="tally"&&<Modal title="🏢 Tally XML" onClose={()=>setModal(null)}><TallyImport onImport={t=>importTxs(t,"TALLY")} onClose={()=>setModal(null)}/></Modal>}
      {modal==="webhook"&&<Modal title="🔗 Webhook Setup" onClose={()=>setModal(null)}><WebhookPanel/></Modal>}
      {editTx&&<Modal title={"Edit: "+editTx.billNo} onClose={()=>setEditTx(null)}><TxForm tx={editTx} onSave={f=>{setTxs(t=>t.map(x=>x.id===editTx.id?{...makeTx(f,"MANUAL"),id:editTx.id,date:editTx.date,paid:editTx.paid}:x));addLog("✏️ Edited "+editTx.billNo);setEditTx(null);}} onDelete={()=>{setTxs(t=>t.filter(x=>x.id!==editTx.id));addLog("🗑 Deleted "+editTx.billNo);setEditTx(null);}}/></Modal>}
      {payTx&&<PayNowModal tx={payTx} vendors={vendors} onPaymentDone={markPaid} onClose={()=>setPayTx(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
